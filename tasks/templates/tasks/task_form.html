{% extends "base.html" %}
{% block content %}
    <h2>{% if form.instance.pk %}Редактировать задачу{% else %}Создать задачу{% endif %}</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Сохранить</button>
    </form>

    <a href="{% url 'tasks:task_list' %}">Назад</a>
{% endblock %}
