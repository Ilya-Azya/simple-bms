{% extends "base.html" %}
{% block content %}
    <h2>Удаление задачи</h2>
    <p>Вы уверены, что хотите удалить задачу "{{ task.title }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Да, удалить</button>
        <a href="{% url 'task_detail' task.pk %}">Отмена</a>
    </form>
{% endblock %}
