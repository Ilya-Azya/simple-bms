{% extends "base.html" %}
{% load widget_tweaks %}
{% block content %}
    <div class="container mt-4">
        <h2>Команды</h2>
        <a href="{% url 'teams:team_create' %}" class="btn btn-primary mb-3">Создать команду</a>

        <ul class="list-group">
            {% for team in teams %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <span>{{ team.name }}</span>
                    <span class="badge bg-secondary">{{ team.invite_code }}</span>
                </li>
            {% empty %}
                <li class="list-group-item">Команд пока нет.</li>
            {% endfor %}
        </ul>
    </div>
{% endblock %}
